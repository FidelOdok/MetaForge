name: Release

on:
  release:
    types: [created, published]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-release:
    name: Build & Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install build tools
        run: pip install build twine

      - name: Build Python wheel + source distribution
        run: python -m build

      - name: List built artifacts
        run: ls -lh dist/

      - name: Publish to PyPI (disabled for v0.1, enable in v0.2+)
        # Uncomment when PyPI account is configured
        # env:
        #   TWINE_USERNAME: __token__
        #   TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # run: twine upload dist/
        run: echo "PyPI publishing disabled for v0.1 — enable in v0.2+"

      - name: Upload distributions to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v2

      - name: Build Docker image (v0.1 — local build only)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: metaforge-gateway:${{ steps.version.outputs.version }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load and inspect image
        run: |
          docker load --input /tmp/image.tar
          docker images | grep metaforge-gateway
          docker inspect metaforge-gateway:${{ steps.version.outputs.version }} | grep -A 10 Config

      - name: Save Docker image for artifact
        run: |
          docker save metaforge-gateway:${{ steps.version.outputs.version }} \
            | gzip > /tmp/metaforge-gateway-${{ steps.version.outputs.version }}.tar.gz
          ls -lh /tmp/metaforge-gateway-*.tar.gz

      - name: Upload Docker image to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/metaforge-gateway-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (disabled for v0.1, enable in v0.2+)
        # Uncomment when Docker Hub account is configured
        # uses: docker/login-action@v2
        # with:
        #   username: ${{ secrets.DOCKERHUB_USERNAME }}
        #   password: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "Docker Hub login disabled for v0.1 — enable in v0.2+"

      - name: Build and push to Docker Hub (disabled for v0.1, enable in v0.2+)
        # Uncomment when Docker Hub account is configured
        # uses: docker/build-push-action@v4
        # with:
        #   context: .
        #   platforms: linux/amd64,linux/arm64
        #   push: true
        #   tags: |
        #     ${{ secrets.DOCKERHUB_USERNAME }}/metaforge-gateway:${{ steps.version.outputs.version }}
        #     ${{ secrets.DOCKERHUB_USERNAME }}/metaforge-gateway:latest
        run: echo "Docker Hub push disabled for v0.1 — enable in v0.2+"

  release-notes:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: changelog
        run: |
          # Extract section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          if grep -q "\[${VERSION#v}\]" CHANGELOG.md; then
            sed -n "/\[${VERSION#v}\]/,/^## \[/p" CHANGELOG.md | head -n -1 > /tmp/changelog.txt
            cat /tmp/changelog.txt
          else
            echo "No CHANGELOG entry found for ${VERSION}" > /tmp/changelog.txt
            cat /tmp/changelog.txt
          fi

      - name: Update release with notes from CHANGELOG
        uses: softprops/action-gh-release@v1
        with:
          body_path: /tmp/changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [build-and-release, docker-image]
    if: always()

    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check job status
        id: status
        run: |
          if [ "${{ needs.build-and-release.result }}" = "success" ] && [ "${{ needs.docker-image.result }}" = "success" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "message=✅ Release ${{ steps.version.outputs.version }} published successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "message=❌ Release ${{ steps.version.outputs.version }} failed"
          fi

      - name: Log release status
        run: echo "${{ steps.status.outputs.message }}"

      # Optionally notify Slack (uncomment when webhook is available)
      # - name: Notify Slack
      #   if: ${{ steps.status.outputs.success }} == 'true'
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: ${{ job.status }}
      #     text: "${{ steps.status.outputs.message }} — Download from https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
      #     webhook_url: ${{ secrets.SLACK_WEBHOOK }}
