global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default-webhook

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "http://host.docker.internal:8000/api/v1/alerts"
        send_resolved: true
