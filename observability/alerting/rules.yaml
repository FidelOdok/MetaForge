groups:
  - name: metaforge_critical
    rules:
      - alert: GatewayDown
        expr: up{job="metaforge-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MetaForge Gateway is down"
          description: "Gateway has been unreachable for more than 1 minute."
          runbook_url: "https://docs.metaforge.dev/runbooks/gateway-down"

      - alert: KafkaConsumerStopped
        expr: rate(metaforge_kafka_messages_consumed_total[5m]) == 0 and metaforge_kafka_consumer_lag > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer {{ $labels.consumer_group }} has stopped"
          description: "Consumer group {{ $labels.consumer_group }} has zero consumption rate but non-zero lag."

      - alert: Neo4jUnreachable
        expr: metaforge_neo4j_active_connections == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Neo4j is unreachable"
          description: "No active Neo4j connections for more than 1 minute."

  - name: metaforge_warning
    rules:
      - alert: HighAgentFailureRate
        expr: rate(metaforge_agent_execution_total{status="error"}[10m]) / rate(metaforge_agent_execution_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High agent failure rate for {{ $labels.agent_code }}"
          description: "Agent {{ $labels.agent_code }} has >10% failure rate over 10 minutes."

      - alert: KafkaConsumerLagHigh
        expr: metaforge_kafka_consumer_lag > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumer_group }} topic {{ $labels.topic }} has lag > 5000."

      - alert: ErrorBudgetBurnRate
        expr: |
          (
            1 - (
              sum(rate(metaforge_gateway_request_total{status_code!~"5.."}[1h]))
              /
              sum(rate(metaforge_gateway_request_total[1h]))
            )
          ) * 720 > 14.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error budget burn rate is too high"
          description: "Gateway error budget is being consumed at 14.4x the sustainable rate."

      - alert: LLMCostSpike
        expr: sum(rate(metaforge_agent_llm_cost_usd_total[1h])) * 3600 > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "LLM cost spike detected"
          description: "Projected hourly LLM cost exceeds $10."

      - alert: OscillationDetected
        expr: rate(metaforge_oscillation_detected_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Design oscillation detected"
          description: "Agent feedback loop detected for {{ $labels.node_type }}."

  - name: metaforge_fleet_alerts
    rules:
      # Device has not sent telemetry for > N minutes (configurable per device type).
      # The threshold is set per device_type label on the metric; default 5m window.
      - alert: DeviceTelemetryStopped
        expr: |
          (time() - metaforge_device_last_telemetry_timestamp) > on(device_type)
          group_left metaforge_device_type_telemetry_interval_seconds * 3
          or
          (time() - metaforge_device_last_telemetry_timestamp) > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Device {{ $labels.device_id }} telemetry stopped"
          description: >-
            Device {{ $labels.device_id }} (type: {{ $labels.device_type }}) has not sent
            telemetry for more than 3x its expected reporting interval. Last seen
            {{ $value | humanizeDuration }} ago.
          runbook_url: "observability/runbooks/device-telemetry-stopped.md"

      # Sensor value exceeds defined safe operating range (min/max thresholds).
      - alert: SensorOutOfRange
        expr: |
          metaforge_sensor_value > on(device_type, sensor_name)
          group_left metaforge_sensor_threshold_max
          or
          metaforge_sensor_value < on(device_type, sensor_name)
          group_left metaforge_sensor_threshold_min
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Sensor {{ $labels.sensor_name }} out of range on device {{ $labels.device_id }}"
          description: >-
            Sensor {{ $labels.sensor_name }} on device {{ $labels.device_id }}
            (type: {{ $labels.device_type }}) reported value {{ $value }} which is
            outside the safe operating range.
          runbook_url: "observability/runbooks/sensor-out-of-range.md"

      # Device connection lost (MQTT disconnect without graceful shutdown).
      - alert: DeviceOffline
        expr: |
          metaforge_device_connection_status == 0
          and
          metaforge_device_graceful_disconnect == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Device {{ $labels.device_id }} offline (ungraceful disconnect)"
          description: >-
            Device {{ $labels.device_id }} (type: {{ $labels.device_type }}) lost MQTT
            connection without a graceful shutdown. The device has been offline for more
            than 2 minutes.
          runbook_url: "observability/runbooks/device-offline.md"

      # Unusual number of devices reporting errors simultaneously.
      - alert: FleetAnomalyPattern
        expr: |
          count(
            rate(metaforge_device_error_total[5m]) > 0
          ) > on() (count(metaforge_device_connection_status) * 0.10)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Fleet-wide anomaly: {{ $value }} devices reporting errors simultaneously"
          description: >-
            More than 10% of the fleet ({{ $value }} devices) are reporting errors
            simultaneously over the last 5 minutes. This may indicate a systemic issue
            such as a firmware bug, infrastructure failure, or environmental event.
          runbook_url: "observability/runbooks/fleet-anomaly-pattern.md"

      # Telemetry write errors exceeding threshold — TSDB ingestion failing.
      - alert: TSDBIngestionFailing
        expr: |
          (
            sum(rate(metaforge_tsdb_write_errors_total[5m]))
            /
            clamp_min(sum(rate(metaforge_tsdb_write_requests_total[5m])), 1)
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TSDB ingestion failure rate is {{ $value | humanizePercentage }}"
          description: >-
            Telemetry write error rate to the time-series database exceeds 1% over the
            last 5 minutes. Current rate: {{ $value | humanizePercentage }}. Device
            telemetry data may be lost.
          runbook_url: "observability/runbooks/tsdb-ingestion-failing.md"

  - name: metaforge_retrieval_quality
    rules:
      # Average precision@k drops by more than 10% relative to a 24h
      # baseline. Trips on real regressions (model drift, corpus rot,
      # bad ingest) before users notice degraded answers.
      - alert: RetrievalPrecisionRegression
        expr: |
          (
            avg_over_time(
              histogram_quantile(0.5, sum by (le)(rate(metaforge_retrieval_precision_at_k_bucket[1h])))[1h:5m]
            )
            <
            0.9 *
            avg_over_time(
              histogram_quantile(0.5, sum by (le)(rate(metaforge_retrieval_precision_at_k_bucket[1h])))[24h:5m]
            )
          )
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Retrieval precision@k regressed > 10% vs 24h baseline"
          description: >-
            Median precision@k dropped more than 10% relative to its 24h
            average over the last hour. Investigate the embedding model,
            corpus changes, or recent ingest jobs.
          runbook_url: "observability/runbooks/retrieval-quality-regression.md"

      # Context-truncation rate spike — agents losing fragments past the
      # token budget more often than usual.
      - alert: ContextTruncationSpike
        expr: |
          sum(rate(metaforge_context_truncated_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Context truncation rate above 1 drop/sec for 10m"
          description: >-
            The assembler dropped fragments past the token budget at >1/sec
            for the last 10 minutes. Either the budget is too tight for
            the corpus, or a runaway query is over-fetching.
          runbook_url: "observability/runbooks/context-truncation-spike.md"

      # MET-401 (L1-A7) — HP-RETR-08 SLO: knowledge search p95 must
      # stay under 200 ms on the 1k-doc corpus. Five-minute window and
      # 5-minute "for" duration so a single stuck query does not page
      # but a sustained latency regression does.
      # severity is "warning" (Sev 3 in the platform mapping — paged
      # via slack-warning per ``routes.yaml`` at a 1h repeat). The
      # platform routes only know critical/warning/info; "sev3" would
      # silently fall through to the default-slack receiver, defeating
      # the purpose of the SLO alert.
      - alert: KnowledgeSearchLatencySLO
        expr: |
          histogram_quantile(
            0.95,
            sum by (le)(rate(metaforge_knowledge_search_duration_seconds_bucket[5m]))
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          sev: "3"
        annotations:
          summary: "Knowledge search p95 latency exceeds 200 ms SLO"
          description: >-
            p95 of ``metaforge_knowledge_search_duration_seconds`` over
            the last 5 minutes is above the 200 ms HP-RETR-08 target.
            Check the LightRAG service, pgvector index health, and the
            reranker cold-start path before acknowledging.
          runbook_url: "observability/runbooks/knowledge-search-latency-slo.md"

      # MET-439 — Twin graph hygiene. The orphan scan (MET-429) emits
      # a per-kind gauge after every find_orphans() call. Any sustained
      # non-zero value means an agent or migration left dependent nodes
      # dangling — visible as cryptic None returns from get_work_product
      # deep in agent reasoning, so paging here heads off the confusion.
      - alert: TwinOrphansDetected
        expr: metaforge_twin_orphans{kind=~".+"} > 0
        for: 5m
        labels:
          severity: warning
          sev: "3"
        annotations:
          summary: "Twin has dangling dependent nodes"
          description: >-
            {{ $labels.kind }} orphan count: {{ $value }}. Run
            ``TwinAPI.find_orphans()`` to enumerate and either rebind or
            cascade-delete via ``delete_work_product(id, cascade=True)``.
          runbook_url: "observability/runbooks/twin-orphans.md"

      # MET-455 — Consolidation contradiction rate. The BACKGROUND
      # synthesis pass flags newly-synthesized insights that conflict
      # with the existing corpus. A sustained nonzero rate means the
      # memory layer is accumulating contradictory lessons faster than
      # they're being reconciled — agents will get conflicting advice.
      - alert: ConsolidationContradictionsRising
        expr: increase(metaforge_consolidation_contradictions_total[1h]) > 5
        for: 15m
        labels:
          severity: warning
          sev: "3"
        annotations:
          summary: "Consolidation is producing contradictory insights"
          description: >-
            More than 5 contradictory insights flagged in the last hour.
            Review GET /v1/memory/insights and the consolidation logs;
            reconcile or mark the conflicting insights stale.
          runbook_url: "observability/runbooks/consolidation-contradictions.md"

  # MET-476 — KB object-store (MinIO) operational alerts. These rules
  # activate once Prometheus scrapes the MinIO ``/minio/v2/metrics/*``
  # endpoints; on a single-node MinIO they evaluate normally, and on a
  # MinIO-less environment they're inert (no series to match). The three
  # warnings cover bucket size, write latency, and access errors per the
  # MET-476 acceptance criteria.
  - name: metaforge_storage_alerts
    rules:
      - alert: MinIOKBBucketSizeHigh
        expr: minio_bucket_usage_total_bytes{bucket="metaforge-kb"} > 1.0995116e+11  # 100 GiB
        for: 30m
        labels:
          severity: warning
          sev: "3"
        annotations:
          summary: "MinIO KB bucket usage above 100 GiB"
          description: >-
            ``metaforge-kb`` bucket has exceeded 100 GiB of stored bytes for
            >30 minutes. Lifecycle is configured to transition objects to
            cold storage after 365 days; check whether the configured tier
            is healthy and whether ingest volume warrants raising this
            threshold.
          runbook_url: "observability/runbooks/minio-bucket-size.md"

      - alert: MinIOKBWriteLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(minio_s3_requests_seconds_bucket{api="PutObject",bucket="metaforge-kb"}[5m])
            )
          ) > 5
        for: 10m
        labels:
          severity: warning
          sev: "3"
        annotations:
          summary: "MinIO KB write p95 latency > 5s"
          description: >-
            PutObject p95 latency on ``metaforge-kb`` exceeded 5s for
            10 minutes. Check MinIO node health, network egress, and
            backing-disk saturation; ingest pipelines (MET-468) will
            stall under sustained slow writes.
          runbook_url: "observability/runbooks/minio-write-latency.md"

      - alert: MinIOKBAccessErrorsRising
        expr: |
          sum(rate(minio_s3_requests_errors_total{bucket="metaforge-kb"}[5m])) > 0.5
        for: 15m
        labels:
          severity: warning
          sev: "3"
        annotations:
          summary: "MinIO KB error rate > 0.5 req/s"
          description: >-
            Sustained access-error rate on ``metaforge-kb`` above
            0.5 req/s for 15 minutes. Inspect MinIO logs for 4xx /
            5xx patterns, verify credentials + IAM policies, and check
            for client misconfigurations.
          runbook_url: "observability/runbooks/minio-access-errors.md"
