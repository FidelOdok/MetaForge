# LibreChat — MetaForge's flagship chat/agent surface (MET-552)
# ------------------------------------------------------------------
# Standalone lifecycle: brought up independently of the core stack but
# joined to the existing `metaforge_metaforge` network so it can reach the
# mcp-http sidecar by service name (http://mcp-http:8765/mcp).
#
#   cd ~/MetaForge
#   cp deploy/librechat/.env.example deploy/librechat/.env   # then fill in keys
#   docker compose -f docker-compose.librechat.yml up -d
#   # → http://<host>:3080
#
# Requires the core stack (specifically mcp-http) to be running so the
# external network exists and MCP tools resolve.

services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: metaforge-librechat
    restart: unless-stopped
    depends_on:
      - librechat-mongo
    ports:
      - "3080:3080"
    env_file:
      - deploy/librechat/.env
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://librechat-mongo:27017/LibreChat
      CONFIG_PATH: /app/librechat.yaml
      # Let a first user self-register (no email server needed for dev).
      ALLOW_REGISTRATION: "true"
      ALLOW_EMAIL_LOGIN: "true"
    volumes:
      - type: bind
        source: ./deploy/librechat/librechat.yaml
        target: /app/librechat.yaml
      - librechat-images:/app/client/public/images
      - librechat-logs:/app/api/logs
    networks:
      - metaforge

  librechat-mongo:
    image: mongo:7
    container_name: metaforge-librechat-mongo
    restart: unless-stopped
    command: mongod --noauth
    volumes:
      - librechat-mongo:/data/db
    networks:
      - metaforge

volumes:
  librechat-mongo:
  librechat-images:
  librechat-logs:

networks:
  # The core stack's default network (project `metaforge`, network
  # `metaforge`). `docker network ls` shows it as `metaforge_metaforge`.
  metaforge:
    external: true
    name: metaforge_metaforge
