# LibreChat configuration for MetaForge (MET-552)
# ------------------------------------------------------------------
# LibreChat is adopted as MetaForge's flagship chat/agent surface. Its
# agents drive MetaForge's Digital Twin + tools over MCP. LLM provider
# keys come from the environment (see deploy/librechat/.env.example) —
# MetaForge exposes no OpenAI-compatible endpoint, so LibreChat talks to
# the providers directly and reaches MetaForge only for *tools*.
#
# Docs: https://www.librechat.ai/docs/configuration/librechat_yaml
version: 1.2.1
cache: true

# --- MCP SSRF exemption -----------------------------------------------
# LibreChat blocks private/internal hosts by default (SSRF guard). The
# mcp-http sidecar is an internal Docker service, so exempt exactly it
# (host:port required) while keeping the block on for everything else.
mcpSettings:
  allowedAddresses:
    - "mcp-http:8765"

# --- MCP: MetaForge domain tools --------------------------------------
# The mcp-http sidecar serves a stateless, spec-compliant streamable-HTTP
# MCP endpoint at POST /mcp (verified: initialize + tools/list → 76 tools,
# standard MCP method names in metaforge/mcp/server.py). Reached by docker
# service name on the shared `metaforge_metaforge` network. This is NOT the
# bespoke `/mcp/sse` endpoint (that one is query-param based, non-spec).
mcpServers:
  metaforge:
    type: streamable-http
    url: http://mcp-http:8765/mcp
    timeout: 120000
    # The sidecar runs in open mode on the internal network today. When
    # METAFORGE_MCP_API_KEY is set on the sidecar, uncomment to authenticate:
    # headers:
    #   Authorization: 'Bearer ${METAFORGE_MCP_API_KEY}'

# --- Agents -----------------------------------------------------------
# Agents are enabled by default; recursionLimit bounds a single ReAct run
# so a tool-happy turn can't loop unbounded.
endpoints:
  agents:
    recursionLimit: 25
    # Allow agents to attach MetaForge MCP tools.
    allowedProviders:
      - anthropic
      - openAI
