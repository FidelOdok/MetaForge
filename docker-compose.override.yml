# Dev override — auto-merged by Docker Compose.
#
# Mounts local source into containers so code changes take effect
# instantly via hot-reload. No rebuild needed.
#
# Usage:
#   docker compose up gateway dashboard-dev   # Gateway + Vite HMR dashboard
#   docker compose up                         # Same — override is auto-applied
#
# To run WITHOUT the override (production-like):
#   docker compose -f docker-compose.yml up

services:
  gateway:
    command: >
      uvicorn api_gateway.server:app
      --host 0.0.0.0 --port 8000 --reload
      --ws websockets-sansio
      --reload-dir /app/api_gateway
      --reload-dir /app/orchestrator
      --reload-dir /app/twin_core
      --reload-dir /app/shared
      --reload-dir /app/domain_agents
      --reload-dir /app/skill_registry
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./api_gateway:/app/api_gateway
      - ./orchestrator:/app/orchestrator
      - ./twin_core:/app/twin_core
      - ./digital_twin:/app/digital_twin
      - ./shared:/app/shared
      - ./skill_registry:/app/skill_registry
      - ./mcp_core:/app/mcp_core
      - ./tool_registry:/app/tool_registry
      - ./domain_agents:/app/domain_agents
      - ./observability:/app/observability
      - ./metaforge:/app/metaforge
      - ./pyproject.toml:/app/pyproject.toml:ro
      - adapter-workspace:/workspace:ro

  dashboard-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ./dashboard:/app
      - dashboard-node-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://gateway:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - metaforge
    restart: unless-stopped

  # ── MCP HTTP sidecar (dev) — exposes the unified MCP server on :8765
  # Reuses the gateway image (built once, cached); same source mounts so
  # hot-reload picks up changes. DATABASE_URL points at the in-cluster
  # postgres so knowledge + memory adapters wire up.
  mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python -m metaforge.mcp --transport http
      --host 0.0.0.0 --port 8765
      --adapters knowledge,memory,cadquery,freecad,calculix,kicad,twin,project,constraint,digikey
      --allow-twin-mutations
      --capture-sessions
    ports:
      - "8765:8765"
    environment:
      - METAFORGE_ENV=docker
      - NEO4J_URI=bolt://neo4j:7687
      # Credentials sourced from .env — same vars the gateway service uses.
      # No literal fallbacks: secret scanners treat a hardcoded user/pass
      # pair in a connection string as a credential leak even for dev defaults.
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY:-}
      - LIGHTRAG_MODEL=${LIGHTRAG_MODEL:-}
      - METAFORGE_ADAPTER_CADQUERY_URL=http://cadquery-adapter:8101
      - METAFORGE_ADAPTER_FREECAD_URL=http://freecad-adapter:8102
      - OCCT_CONVERTER_URL=http://occt-converter:8100
      - ADAPTER_WORKSPACE_DIR=/workspace
      # MET-495: same MinIO config as the gateway so twin.record_decision can
      # store decision blobs in the shared work-products bucket (without it,
      # the blob client hangs on a misconfigured endpoint).
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-metaforge-kb}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - WATCHFILES_FORCE_POLLING=true
      # Static API-key auth (MET-338). Once the Cloudflare tunnel (MET-482)
      # makes :8765 publicly reachable, set this in .env so the endpoint
      # isn't open to the world. Empty => open mode (LAN-only dev).
      - METAFORGE_MCP_API_KEY=${METAFORGE_MCP_API_KEY:-}
      # OAuth 2.1 + PKCE for the claude.ai web connector (MET-480).
      # Setting the login secret turns the OAuth server on; the issuer is
      # the public tunnel hostname (else derived from forwarded headers).
      - METAFORGE_OAUTH_LOGIN_SECRET=${METAFORGE_OAUTH_LOGIN_SECRET:-}
      - METAFORGE_OAUTH_ISSUER=${METAFORGE_OAUTH_ISSUER:-}
    volumes:
      - ./api_gateway:/app/api_gateway
      - ./orchestrator:/app/orchestrator
      - ./twin_core:/app/twin_core
      - ./digital_twin:/app/digital_twin
      - ./shared:/app/shared
      - ./skill_registry:/app/skill_registry
      - ./mcp_core:/app/mcp_core
      - ./tool_registry:/app/tool_registry
      - ./domain_agents:/app/domain_agents
      - ./observability:/app/observability
      - ./metaforge:/app/metaforge
      - ./pyproject.toml:/app/pyproject.toml:ro
      - adapter-workspace:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metaforge
    restart: unless-stopped

  # ── Cloudflare named tunnel (dev) — exposes mcp-http to Claude cloud
  # Gives the MCP sidecar a stable public HTTPS hostname so the claude.ai
  # web connector and remote/cloud Claude Code can reach it — no inbound
  # ports opened on the host. (MET-482)
  #
  # Setup (one-time, in the Cloudflare Zero Trust dashboard):
  #   1. Networks → Tunnels → Create a tunnel (type: Cloudflared).
  #   2. Copy the tunnel token into .env as CLOUDFLARE_TUNNEL_TOKEN.
  #   3. Add a Public Hostname route on that tunnel:
  #        Subdomain/domain → e.g. mcp.yourdomain.com
  #        Service          → HTTP   http://mcp-http:8765
  #      (The container resolves mcp-http over the metaforge network.)
  #   4. Point Claude at https://mcp.yourdomain.com/mcp — see
  #      docs/runbooks/cloudflare-mcp-tunnel.md.
  #
  # Ingress lives in the dashboard against the token, so no local config
  # file is needed — `tunnel run` reads everything from the token.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - mcp-http
    networks:
      - metaforge
    restart: unless-stopped
